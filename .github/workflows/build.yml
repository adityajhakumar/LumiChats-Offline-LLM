name: Build LumiChats Offline — Windows, macOS, Linux

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # WINDOWS — produces LumiChats-Setup-v1.1.exe with your custom wizard images
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python & aqtinstall
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt 6.8.3
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -O C:\Qt `
            --archives qtbase qtdeclarative qtsvg
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -O C:\Qt `
            --modules qthttpserver qtlanguageserver qtshadertools qtquick3d qtwebsockets qtpdf qt5compat

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S gpt4all-chat -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="C:\Qt\6.8.3\msvc2022_64" ^
            -DLLMODEL_CUDA=OFF ^
            -DLLMODEL_VULKAN=OFF ^
            -DGPT4ALL_TEST=OFF

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --config Release --parallel

      - name: Deploy Qt DLLs
        run: |
          C:\Qt\6.8.3\msvc2022_64\bin\windeployqt.exe `
            build\bin\Release\chat.exe `
            --qmldir gpt4all-chat\qml

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer (with custom wizard images)
        run: |
          # Copy your wizard images to expected location
          Copy-Item installer\wizard_large.bmp C:\wizard_large.bmp
          Copy-Item installer\wizard_small.bmp C:\wizard_small.bmp
          Copy-Item installer\lumichats.ico C:\lumichats.ico
          
          # Build the installer
          iscc installer\LumiChats-installer.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: LumiChats-Windows-Installer
          path: installer-output\LumiChats-Setup-v1.1.exe

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — produces LumiChats.dmg with your logo as the app icon
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS DMG
    runs-on: macos-14  # Apple Silicon M1 runner — free on GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python & aqtinstall
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt 6.8.3 for macOS
        run: |
          pip install aqtinstall
          aqt install-qt mac desktop 6.8.3 clang_64 -O ~/Qt \
            --archives qtbase qtdeclarative qtsvg
          aqt install-qt mac desktop 6.8.3 clang_64 -O ~/Qt \
            --modules qthttpserver qtlanguageserver qtshadertools qtquick3d qtwebsockets qtpdf qt5compat

      - name: Configure CMake
        run: |
          cmake -S gpt4all-chat -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/Qt/6.8.3/macos" \
            -DLLMODEL_CUDA=OFF \
            -DLLMODEL_VULKAN=OFF \
            -DGPT4ALL_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt frameworks into .app
        run: |
          ~/Qt/6.8.3/macos/bin/macdeployqt \
            build/bin/Release/LumiChats.app \
            -qmldir=gpt4all-chat/qml \
            -dmg

      - name: Rename DMG
        run: mv build/bin/Release/LumiChats.dmg LumiChats-macOS-v1.1.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: LumiChats-macOS-DMG
          path: LumiChats-macOS-v1.1.dmg

  # ─────────────────────────────────────────────────────────────────────────────
  # LINUX — produces LumiChats.AppImage
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgl1-mesa-dev libgles2-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-keysyms1-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-xinerama0-dev \
            libxcb-xfixes0-dev libx11-xcb-dev \
            libfontconfig1-dev libfreetype6-dev \
            fuse libfuse2

      - name: Install Python & aqtinstall
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt 6.8.3 for Linux
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.8.3 gcc_64 -O ~/Qt \
            --archives qtbase qtdeclarative qtsvg
          aqt install-qt linux desktop 6.8.3 gcc_64 -O ~/Qt \
            --modules qthttpserver qtlanguageserver qtshadertools qtquick3d qtwebsockets qtpdf qt5compat

      - name: Configure CMake
        run: |
          cmake -S gpt4all-chat -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$HOME/Qt/6.8.3/gcc_64" \
            -DLLMODEL_CUDA=OFF \
            -DLLMODEL_VULKAN=OFF \
            -DGPT4ALL_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Package AppImage
        env:
          QMAKE: $HOME/Qt/6.8.3/gcc_64/bin/qmake
          QML_SOURCES_PATHS: gpt4all-chat/qml
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/bin/Release/chat \
            --plugin qt \
            --output appimage \
            --icon-file installer/lumichats.png \
            --desktop-file installer/LumiChats.desktop

      - name: Rename AppImage
        run: mv LumiChats*.AppImage LumiChats-Linux-v1.1.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: LumiChats-Linux-AppImage
          path: LumiChats-Linux-v1.1.AppImage

  # ─────────────────────────────────────────────────────────────────────────────
  # CREATE GITHUB RELEASE — attaches all 3 builds automatically
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: 📦 Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          name: LumiChats Offline LLM v1.1
          body: |
            ## LumiChats Offline LLM v1.1
            
            Run powerful AI models privately on your Windows, macOS, or Linux PC.
            No internet. No GPU. No cloud. 100% private.
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `LumiChats-Setup-v1.1.exe` — installer with wizard |
            | 🍎 macOS | `LumiChats-macOS-v1.1.dmg` — drag to Applications |
            | 🐧 Linux | `LumiChats-Linux-v1.1.AppImage` — make executable and run |
            
            ### What's New
            - Orange LumiChats brand identity
            - Ultra-dark mode
            - NOMIC branding removed
            - LumiChats home screen with offline news
            
            Built on [GPT4All](https://github.com/nomic-ai/gpt4all) by Nomic AI (MIT License)
          files: |
            LumiChats-Windows-Installer/LumiChats-Setup-v1.1.exe
            LumiChats-macOS-DMG/LumiChats-macOS-v1.1.dmg
            LumiChats-Linux-AppImage/LumiChats-Linux-v1.1.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
