name: Build LumiChats

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS DMG
    runs-on: macos-14
    steps:
      - name: Checkout LumiChats repo
        uses: actions/checkout@v4

      - name: Clone GPT4All with submodules
        run: |
          git clone --recurse-submodules --depth=1 \
            https://github.com/nomic-ai/gpt4all.git gpt4all-src

      - name: Overlay LumiChats custom files + patch app name
        run: |
          cp lumichats-src/qml/Theme.qml          gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/HomeView.qml        gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/ChatView.qml        gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/StartupDialog.qml   gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/main.qml            gpt4all-src/gpt4all-chat/
          cp lumichats-src/src/download.cpp        gpt4all-src/gpt4all-chat/src/
          sed -i '' 's/MACOSX_BUNDLE_BUNDLE_NAME "GPT4All"/MACOSX_BUNDLE_BUNDLE_NAME "LumiChats"/g' gpt4all-src/gpt4all-chat/CMakeLists.txt
          sed -i '' 's/MACOSX_BUNDLE_GUI_IDENTIFIER "io.nomic.gpt4all"/MACOSX_BUNDLE_GUI_IDENTIFIER "com.lumichats.app"/g' gpt4all-src/gpt4all-chat/CMakeLists.txt
          sed -i '' 's/setApplicationName("GPT4All")/setApplicationName("LumiChats")/g' gpt4all-src/gpt4all-chat/src/main.cpp
          sed -i '' 's/setOrganizationName("nomic.ai")/setOrganizationName("LumiChats")/g' gpt4all-src/gpt4all-chat/src/main.cpp
          sed -i '' 's/setOrganizationDomain("nomic.ai")/setOrganizationDomain("lumichats.com")/g' gpt4all-src/gpt4all-chat/src/main.cpp

      - name: Install Qt 6.8.3
        run: |
          pip3 install aqtinstall --break-system-packages
          aqt install-qt mac desktop 6.8.3 clang_64 \
            -O ~/Qt \
            --modules qthttpserver qtlanguageserver qtshadertools qtquick3d qt5compat qtwebsockets qtpdf

      - name: Configure CMake
        run: |
          cmake -S gpt4all-src/gpt4all-chat -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=~/Qt/6.8.3/macos \
            -DLLMODEL_CUDA=OFF \
            -DLLMODEL_VULKAN=OFF \
            -DLLMODEL_KOMPUTE=OFF \
            -DGPT4ALL_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Package DMG
        run: |
          APP=$(find build -name "*.app" | head -1)
          echo "Found app: $APP"
          # Rename to LumiChats.app
          APPDIR=$(dirname "$APP")
          if [ "$(basename $APP)" != "LumiChats.app" ]; then
            mv "$APP" "$APPDIR/LumiChats.app"
            APP="$APPDIR/LumiChats.app"
          fi
          # Remove optional SQL plugins that cause macdeployqt warnings
          rm -f ~/Qt/6.8.3/macos/plugins/sqldrivers/libqsqlmimer.dylib
          rm -f ~/Qt/6.8.3/macos/plugins/sqldrivers/libqsqlodbc.dylib
          rm -f ~/Qt/6.8.3/macos/plugins/sqldrivers/libqsqlpsql.dylib
          # Run macdeployqt fully - this bundles ALL Qt libs inside the .app
          ~/Qt/6.8.3/macos/bin/macdeployqt "$APP" \
            -qmldir=gpt4all-src/gpt4all-chat/qml \
            -dmg
          DMG=$(find . -name "*.dmg" | head -1)
          mv "$DMG" LumiChats-macOS.dmg
          ls -la LumiChats-macOS.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LumiChats-macOS
          path: LumiChats-macOS.dmg

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout LumiChats repo
        uses: actions/checkout@v4

      - name: Clone GPT4All with submodules
        run: |
          git clone --recurse-submodules --depth=1 \
            https://github.com/nomic-ai/gpt4all.git gpt4all-src

      - name: Overlay LumiChats custom files + patch app name
        run: |
          cp lumichats-src/qml/Theme.qml          gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/HomeView.qml        gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/ChatView.qml        gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/StartupDialog.qml   gpt4all-src/gpt4all-chat/qml/
          cp lumichats-src/qml/main.qml            gpt4all-src/gpt4all-chat/
          cp lumichats-src/src/download.cpp        gpt4all-src/gpt4all-chat/src/
          sed -i 's/setApplicationName("GPT4All")/setApplicationName("LumiChats")/g' gpt4all-src/gpt4all-chat/src/main.cpp
          sed -i 's/setOrganizationName("nomic.ai")/setOrganizationName("LumiChats")/g' gpt4all-src/gpt4all-chat/src/main.cpp
          sed -i 's/setOrganizationDomain("nomic.ai")/setOrganizationDomain("lumichats.com")/g' gpt4all-src/gpt4all-chat/src/main.cpp

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ cmake \
            libgl1-mesa-dev \
            libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxcb1-dev \
            libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-util-dev libxkbcommon-dev \
            libxkbcommon-x11-dev fuse \
            libxcb-cursor-dev

      - name: Install Qt 6.8.3
        run: |
          python3 -m venv ~/venv
          ~/venv/bin/pip install aqtinstall
          ~/venv/bin/aqt install-qt linux desktop 6.8.3 linux_gcc_64 \
            -O ~/Qt \
            --modules qthttpserver qtlanguageserver qtshadertools qtquick3d qt5compat qtwebsockets qtpdf

      - name: Configure CMake
        run: |
          cmake -S gpt4all-src/gpt4all-chat -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=~/Qt/6.8.3/gcc_64 \
            -DLLMODEL_CUDA=OFF \
            -DLLMODEL_VULKAN=OFF \
            -DLLMODEL_KOMPUTE=OFF \
            -DGPT4ALL_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Package AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          EXE=$(find build/bin -name "chat" -type f | head -1)
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp "$EXE" AppDir/usr/bin/LumiChats
          cp installer/lumichats.png AppDir/usr/share/icons/hicolor/256x256/apps/lumichats.png
          printf '[Desktop Entry]\nName=LumiChats\nExec=LumiChats\nIcon=lumichats\nType=Application\nCategories=Utility;\n' \
            > AppDir/usr/share/applications/LumiChats.desktop
          rm -f ~/Qt/6.8.3/gcc_64/plugins/sqldrivers/libqsqlmimer.so
          rm -f ~/Qt/6.8.3/gcc_64/plugins/sqldrivers/libqsqlodbc.so
          rm -f ~/Qt/6.8.3/gcc_64/plugins/sqldrivers/libqsqlpsql.so
          QMAKE=~/Qt/6.8.3/gcc_64/bin/qmake \
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          mv LumiChats*.AppImage LumiChats-Linux.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: LumiChats-Linux
          path: LumiChats-Linux.AppImage
